version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 22
  build:
    commands:
      - echo "Iniciando build do react..."
      - cd bia/client
      - npm install
      - NODE_OPTIONS=--openssl-legacy-provider VITE_API_URL=https://bia.leocloud.com.br SKIP_PREFLIGHT_CHECK=true npm run build
artifacts:
  files:
    - '**/*'
  base-directory: bia/client/build
